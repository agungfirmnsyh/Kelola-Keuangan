<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DanaKu — Peminjaman ke Anda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<style>
:root {
  --bg: #e9eceb;
  --surface-0: #f4f5f4;
  --surface-1: #ecefe9;
  --surface-2: #dde2dc;
  --border: rgba(72,81,76,0.16);
  --border-hover: rgba(72,81,76,0.24);
  --text-primary: #2e3430;
  --text-secondary: #5b655f;
  --text-muted: #7a847e;
  --blue: #4f7664;
  --blue-light: #5e8b73;
  --green: #5f7d46;
  --green-light: #6f9155;
  --red: #8f5b3d;
  --red-light: #b1724d;
  --amber: #9b6f2c;
  --amber-light: #c28838;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --font: 'Inter', ui-sans-serif, system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  background: linear-gradient(135deg, #8a8a8a 0%, #a8a8a8 100%);
  background-image:
    radial-gradient(ellipse 900px 500px at 10% -10%, rgba(95,125,70,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 600px 400px at 85% 5%, rgba(79,118,100,0.06) 0%, transparent 55%),
    radial-gradient(ellipse 500px 300px at 50% 100%, rgba(140,94,53,0.06) 0%, transparent 60%);
  color: var(--text-primary);
  font-family: var(--font);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  position: relative;
  isolation: isolate;
}
body::before,
body::after {
  content: '';
  position: fixed;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  pointer-events: none;
  z-index: -1;
  animation: floatGlow 9s ease-in-out infinite;
}
body::before {
  top: -90px;
  left: -70px;
  background: rgba(109,139,125,0.20);
}
body::after {
  right: -60px;
  bottom: 40px;
  background: rgba(107,143,86,0.16);
  animation-delay: -4.5s;
}
@keyframes floatGlow {
  0%, 100% { transform: translate3d(0,0,0) scale(1); }
  50% { transform: translate3d(18px,-18px,0) scale(1.06); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.navbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(214,217,213,0.90);
  backdrop-filter: blur(20px) saturate(120%);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  max-width: 1100px; margin: 0 auto;
  padding: 0 20px; height: 60px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.brand-icon {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--green), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff;
}
.brand-name { font-size: 17px; font-weight: 700; color: var(--text-primary); }
.brand-name span { color: var(--blue-light); }
.nav-pills { display: flex; gap: 4px; }
.nav-pill {
  padding: 7px 14px; border-radius: 999px; font-size: 13px; font-weight: 500;
  text-decoration: none; color: var(--text-secondary);
  border: 1px solid transparent; transition: all 0.18s;
}
.nav-pill:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.nav-pill.active { color: var(--blue-light); background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.25); }
.nav-reset {
  padding: 7px 14px; border-radius: 999px; font-size: 12px; font-weight: 500;
  background: transparent; border: 1px solid var(--border-hover);
  color: var(--text-muted); cursor: pointer; transition: all 0.18s;
}
.nav-reset:hover { color: var(--text-secondary); border-color: rgba(255,255,255,0.22); }

.page { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px; gap: 12px; flex-wrap: wrap;
}
.page-title { font-size: 22px; font-weight: 700; }
.page-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

.kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.kpi-card {
  background: linear-gradient(145deg, rgba(248,249,247,0.95), rgba(235,239,235,0.95));
  border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px 20px;
  position: relative; overflow: hidden;
  transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  box-shadow: 0 14px 32px rgba(87,73,45,0.08);
  animation: fadeUp 0.6s ease both;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.kpi-card.total::before { background: linear-gradient(90deg, var(--blue), transparent); }
.kpi-card.paid::before { background: linear-gradient(90deg, var(--green), transparent); }
.kpi-card.remaining::before { background: linear-gradient(90deg, var(--amber), transparent); }
.kpi-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 18px 38px rgba(87,73,45,0.12); }
.kpi-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.kpi-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.kpi-value { font-size: 22px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; }

.card {
  background: linear-gradient(145deg, rgba(255,251,245,0.95), rgba(243,233,218,0.95));
  border: 1px solid var(--border);
  border-radius: var(--radius-xl); padding: 20px; margin-bottom: 16px;
  box-shadow: 0 18px 42px rgba(87,73,45,0.08);
  backdrop-filter: blur(10px);
  animation: fadeUp 0.65s ease both;
}
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.card-title { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }

.form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
.field input, .field select {
  height: 40px; padding: 0 12px;
  background: var(--surface-0); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-family: var(--font); font-size: 13px;
  transition: border-color 0.18s, box-shadow 0.18s; outline: none; width: 100%;
}
.field input:focus, .field select:focus {
  border-color: rgba(59,130,246,0.50); box-shadow: 0 0 0 3px rgba(59,130,246,0.10);
}
.field input::placeholder { color: var(--text-muted); }
.field select option { background: #1a2235; }

.btn-primary {
  width: 100%; height: 42px; padding: 0 16px;
  background: linear-gradient(135deg, var(--green), var(--blue)); border: none; border-radius: var(--radius-md);
  color: #fff; font-family: var(--font); font-size: 13px; font-weight: 700;
  cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease; margin-top: 4px;
  box-shadow: 0 10px 20px rgba(107,143,86,0.14);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 24px rgba(107,143,86,0.22); }

/* ── LOAN LIST ───────────────────────────────────── */
.loan-list { display: flex; flex-direction: column; gap: 0; }

.loan-item {
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  animation: fadeUp 0.55s ease both;
  transition: transform 0.2s ease, border-color 0.2s ease;
}
.loan-item:last-child { border-bottom: none; }
.loan-item:hover { transform: translateY(-1px); border-color: var(--border-hover); }

.loan-row {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr auto;
  gap: 12px; align-items: center;
}

.loan-avatar {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, rgba(107,143,86,0.16), rgba(109,139,125,0.20));
  border: 1px solid rgba(107,143,86,0.20);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--green);
}
.loan-who-wrap { display: flex; align-items: center; gap: 10px; }
.loan-who { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.loan-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.loan-num { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.loan-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.loan-status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600;
  margin-top: 4px;
}
.badge-green { background: rgba(16,185,129,0.14); color: var(--green-light); }
.badge-blue { background: rgba(59,130,246,0.14); color: var(--blue-light); }
.badge-amber { background: rgba(245,158,11,0.14); color: var(--amber-light); }

.loan-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }

.btn-sm {
  padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border-hover); background: transparent;
  color: var(--text-secondary); cursor: pointer; transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease; white-space: nowrap;
}
.btn-sm:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); transform: translateY(-1px); }
.btn-sm.primary { border-color: rgba(107,143,86,0.24); background: rgba(107,143,86,0.10); color: var(--green); }
.btn-sm.primary:hover { background: rgba(107,143,86,0.16); }
.btn-sm.danger { border-color: rgba(239,68,68,0.30); color: var(--red-light); }
.btn-sm.danger:hover { background: rgba(239,68,68,0.10); }

/* ── PROGRESS BAR ────────────────────────────────── */
.loan-progress { margin-top: 10px; }
.progress-track { height: 4px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
.progress-label { display: flex; justify-content: space-between; margin-top: 5px; }
.progress-label span { font-size: 11px; color: var(--text-muted); }

/* ── PAY PANEL ───────────────────────────────────── */
.pay-panel {
  display: none; margin-top: 14px;
  padding: 14px; border-radius: var(--radius-md);
  background: rgba(107,143,86,0.06); border: 1px solid rgba(107,143,86,0.16);
}
.pay-panel.open { display: block; }
.pay-grid { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: flex-end; }
.pay-panel .field label { color: rgba(96,165,250,0.80); }

.content-grid {
  display: grid;
  grid-template-columns: 0.95fr 1.05fr;
  gap: 16px;
  align-items: start;
}
.content-grid .card {
  margin-bottom: 0;
  height: 100%;
}

.empty {
  text-align: center; padding: 40px 0;
  font-size: 13px; color: var(--text-muted);
}

@media (max-width: 640px) {
  .kpi-row { grid-template-columns: 1fr; gap: 8px; }
  .form-grid { grid-template-columns: 1fr 1fr; }
  .content-grid { grid-template-columns: 1fr; }
  .loan-row { grid-template-columns: 1fr auto; }
  .loan-col-hide { display: none; }
  .nav-pills { display: none; }
}
</style>

<nav class="navbar">
  <div class="nav-inner">
    <a class="brand" href="./Kelola keuangan.html">
      <div class="brand-icon">DK</div>
      <span class="brand-name">Dana<span>Ku</span></span>
    </a>
    <div class="nav-pills">
      <a class="nav-pill" href="./Kelola keuangan.html">Keuangan</a>
      <a class="nav-pill active" href="./Peminjaman.html">Peminjaman</a>
      <a class="nav-pill" href="./Utang.html">Utang</a>
    </div>
    <button class="nav-reset" onclick="resetData()">Reset data</button>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <div>
      <div class="page-title">Peminjaman ke Anda</div>
      <div class="page-sub">Pantau siapa saja yang masih punya utang ke Anda</div>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi-card total">
      <div class="kpi-label"><span class="kpi-dot" style="background:var(--blue)"></span>Total dipinjam</div>
      <div class="kpi-value" id="kTotal">Rp 0</div>
    </div>
    <div class="kpi-card paid">
      <div class="kpi-label"><span class="kpi-dot" style="background:var(--green)"></span>Sudah dibayar</div>
      <div class="kpi-value" id="kPaid">Rp 0</div>
    </div>
    <div class="kpi-card remaining">
      <div class="kpi-label"><span class="kpi-dot" style="background:var(--amber)"></span>Sisa tagihan</div>
      <div class="kpi-value" id="kRemaining">Rp 0</div>
    </div>
  </div>

  <div class="content-grid">
    <div class="card">
      <div class="card-header"><div class="card-title">Tambah peminjam baru</div></div>
      <div class="form-grid">
        <div class="field">
          <label>Nama peminjam</label>
          <input id="borrowerName" type="text" placeholder="cth: Andi">
        </div>
        <div class="field">
          <label>Nominal (Rp)</label>
          <input id="borrowAmount" type="number" placeholder="0" min="0">
        </div>
        <div class="field">
          <label>Tanggal</label>
          <input id="borrowDate" type="date">
        </div>
      </div>
      <button class="btn-primary" onclick="addLoan()">Simpan peminjaman</button>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">Daftar peminjaman</div></div>
      <div class="loan-list" id="loanList"></div>
    </div>
  </div>

</div>

<script>
const fmt = v => {
  const n = Math.round(Math.abs(v));
  if(n>=1e9) return 'Rp '+(n/1e9).toFixed(1).replace('.',',')+'M';
  if(n>=1e6) return 'Rp '+(n/1e6).toFixed(1).replace('.',',')+'jt';
  return 'Rp '+n.toLocaleString('id-ID');
};
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function load(k,d){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

const KEY = 'dk_peminjaman_ke_anda';
let loans = load(KEY, []);
const today = new Date().toISOString().split('T')[0];
document.getElementById('borrowDate').value = today;

function initials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

function computeTotals() {
  const total = loans.reduce((s,l)=>s+(l.initialAmount||0),0);
  const paid = loans.reduce((s,l)=>s+(l.paidAmount||0),0);
  document.getElementById('kTotal').textContent = fmt(total);
  document.getElementById('kPaid').textContent = fmt(paid);
  document.getElementById('kRemaining').textContent = fmt(total - paid);
}

function addLoan() {
  const name = document.getElementById('borrowerName').value.trim();
  const amt = parseFloat(document.getElementById('borrowAmount').value);
  const date = document.getElementById('borrowDate').value;
  if(!name){ alert('Isi nama peminjam dulu.'); return; }
  if(!amt || amt<=0){ alert('Nominal harus lebih dari 0.'); return; }
  if(!date){ alert('Pilih tanggal.'); return; }
  loans.push({ id:Date.now(), borrowerName:name, initialAmount:Math.round(amt), paidAmount:0, loanDate:date, payments:[] });
  save(KEY, loans);
  document.getElementById('borrowerName').value = '';
  document.getElementById('borrowAmount').value = '';
  computeTotals(); renderLoans();
}

function deleteLoan(id) {
  if(!confirm('Hapus data peminjaman ini?')) return;
  loans = loans.filter(l=>l.id!==id);
  save(KEY, loans); computeTotals(); renderLoans();
}

function togglePay(id) {
  const el = document.getElementById('paywrap-'+id);
  if(el) el.classList.toggle('open');
}

function addPayment(loanId) {
  const amtEl = document.getElementById('payAmt-'+loanId);
  const dateEl = document.getElementById('payDate-'+loanId);
  const amt = parseFloat(amtEl.value);
  const date = dateEl.value;
  if(!amt || amt<=0){ alert('Nominal pembayaran harus > 0.'); return; }
  if(!date){ alert('Pilih tanggal pembayaran.'); return; }
  const idx = loans.findIndex(l=>l.id===loanId);
  if(idx<0) return;
  const l = loans[idx];
  const remaining = (l.initialAmount||0)-(l.paidAmount||0);
  if(amt > remaining){ alert('Pembayaran melebihi sisa. Maks: '+fmt(remaining)); return; }
  l.paidAmount = (l.paidAmount||0)+Math.round(amt);
  l.payments = l.payments||[];
  l.payments.push({ id:Date.now(), amount:Math.round(amt), date });
  loans[idx]=l; save(KEY, loans);
  amtEl.value=''; togglePay(loanId);
  computeTotals(); renderLoans();
}

function renderLoans() {
  const el = document.getElementById('loanList');
  if(!loans.length) {
    el.innerHTML = '<div class="empty"><div style="font-size:28px;margin-bottom:8px">🤝</div>Belum ada peminjaman ke Anda</div>';
    return;
  }
  const sorted = [...loans].sort((a,b)=>new Date(a.loanDate)-new Date(b.loanDate));
  el.innerHTML = sorted.map((l, index) => {
    const remaining = (l.initialAmount||0)-(l.paidAmount||0);
    const pct = l.initialAmount>0 ? Math.min(100,Math.round((l.paidAmount||0)/l.initialAmount*100)) : 0;
    const isDone = remaining <= 0;
    const isPartial = !isDone && (l.paidAmount||0) > 0;
    const statusBadge = isDone
      ? '<span class="loan-status-badge badge-green">✓ Lunas</span>'
      : isPartial
        ? '<span class="loan-status-badge badge-blue">Berjalan</span>'
        : '<span class="loan-status-badge badge-amber">Belum ada pembayaran</span>';
    const barColor = isDone ? 'var(--green)' : isPartial ? 'var(--blue)' : 'var(--amber)';
    const ini = initials(l.borrowerName);

    return `<div class="loan-item" style="animation-delay:${index * 70}ms">
      <div class="loan-row">
        <div class="loan-who-wrap">
          <div class="loan-avatar">${esc(ini)}</div>
          <div>
            <div class="loan-who">${esc(l.borrowerName)}</div>
            <div class="loan-date">Pinjam: ${l.loanDate}</div>
          </div>
        </div>
        <div class="loan-col-hide">
          <div class="loan-num">${fmt(l.initialAmount||0)}</div>
          <div class="loan-sub">Awal · ${pct}%</div>
        </div>
        <div class="loan-col-hide">
          <div class="loan-num" style="color:${isDone?'var(--green-light)':isPartial?'var(--blue-light)':'var(--amber-light)'}">${fmt(remaining)}</div>
          ${statusBadge}
        </div>
        <div class="loan-actions">
          ${!isDone ? `<button class="btn-sm primary" onclick="togglePay(${l.id})">Catat bayar</button>` : ''}
          <button class="btn-sm danger" onclick="deleteLoan(${l.id})">Hapus</button>
        </div>
      </div>

      <div class="loan-progress">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${barColor}"></div></div>
        <div class="progress-label">
          <span>Terbayar: ${fmt(l.paidAmount||0)}</span>
          <span>Sisa: ${fmt(remaining)}</span>
        </div>
      </div>

      ${!isDone ? `
      <div class="pay-panel" id="paywrap-${l.id}">
        <div style="font-size:12px;font-weight:600;color:rgba(96,165,250,0.8);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em">Catat pembayaran</div>
        <div class="pay-grid">
          <div class="field">
            <label>Nominal (Rp)</label>
            <input id="payAmt-${l.id}" type="number" min="1" placeholder="cth: 50.000">
          </div>
          <div class="field">
            <label>Tanggal</label>
            <input id="payDate-${l.id}" type="date" value="${today}">
          </div>
          <div class="field" style="justify-content:flex-end">
            <label style="opacity:0">—</label>
            <button class="btn-sm primary" onclick="addPayment(${l.id})" style="height:40px;border-radius:8px">Simpan</button>
          </div>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function resetData() {
  if(!confirm('Reset semua data peminjaman ke Anda?')) return;
  loans = []; save(KEY, loans); computeTotals(); renderLoans();
}

computeTotals(); renderLoans();
</script>
</body>
</html>
